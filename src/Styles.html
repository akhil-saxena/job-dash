<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #faf9f6; color: #2d2d2d; font-size: 13px;
  }
  .sidebar-header { padding: 16px 20px; border-bottom: 1px solid #e5e2dc; }
  .sidebar-header h2 { font-size: 15px; font-weight: 600; color: #2d2d2d; }
  .sidebar-header p { font-size: 11px; color: #aaa; margin-top: 2px; }
  .sidebar-body { padding: 16px 20px; }
  .field { margin-bottom: 14px; }
  .field label {
    display: block; font-size: 11px; font-weight: 500; color: #888;
    margin-bottom: 4px; letter-spacing: 0.3px; text-transform: uppercase;
  }
  .field input, .field select, .field textarea {
    width: 100%; background: white; border: 1px solid #ddd; border-radius: 6px;
    padding: 8px 10px; font-size: 13px; color: #2d2d2d; font-family: inherit;
    outline: none; transition: border-color 0.2s;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: #7c9a72; }
  .field textarea { resize: vertical; min-height: 80px; }
  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; }
  .btn-row { display: flex; gap: 8px; margin-top: 20px; }
  .btn-primary {
    flex: 1; background: #7c9a72; color: white; border: none; border-radius: 6px;
    padding: 10px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit;
  }
  .btn-primary:hover { background: #6b8963; }
  .btn-primary:disabled { background: #b0b0b0; cursor: not-allowed; }
  .btn-cancel {
    background: #eceae5; color: #888; border: none; border-radius: 6px;
    padding: 10px 16px; font-size: 13px; cursor: pointer; font-family: inherit;
  }
  .btn-cancel:hover { background: #e0ded9; }
  .status-msg { padding: 10px 20px; font-size: 12px; text-align: center; margin-top: 12px; border-radius: 6px; }
  .status-msg.success { color: #6a8f72; background: #e5f0e8; }
  .status-msg.error { color: #a67272; background: #f5e5e5; }
  .custom-input {
    display: none; margin-top: 6px;
  }
  .custom-input input {
    border: 1px solid #7c9a72; background: #f5fff5;
  }
</style>
<script>
  /**
   * Populates a <select> with options + a "+ Add new..." option at the end.
   * When "+ Add new..." is selected, shows a text input next to it.
   * @param {string} id - select element id
   * @param {string[]} options - list of options
   * @param {string} defaultVal - default selected value
   * @param {string} [configKey] - if provided, enables "+ Add new..." that saves to _Config
   */
  function populateSelect(id, options, defaultVal, configKey) {
    var sel = document.getElementById(id);
    options.forEach(function(opt) {
      var o = document.createElement('option');
      o.value = opt; o.text = opt;
      if (opt === defaultVal) o.selected = true;
      sel.appendChild(o);
    });

    if (configKey) {
      // Add separator + "Add new" option
      var sep = document.createElement('option');
      sep.disabled = true; sep.text = '───────────';
      sel.appendChild(sep);

      var addNew = document.createElement('option');
      addNew.value = '__add_new__'; addNew.text = '+ Add new...';
      sel.appendChild(addNew);

      // Create custom input below the select
      var customDiv = document.createElement('div');
      customDiv.className = 'custom-input';
      customDiv.id = id + '_custom';
      customDiv.innerHTML = '<input type="text" placeholder="Type new value..." id="' + id + '_input">';
      sel.parentNode.appendChild(customDiv);

      sel.addEventListener('change', function() {
        var customEl = document.getElementById(id + '_custom');
        if (this.value === '__add_new__') {
          customEl.style.display = 'block';
          document.getElementById(id + '_input').focus();
        } else {
          customEl.style.display = 'none';
        }
      });
    }
  }

  /**
   * Gets the actual value from a select that may have a custom input.
   * If "+ Add new..." was selected and custom input has a value,
   * saves it to _Config and returns the custom value.
   */
  function getSelectValue(id, configKey) {
    var sel = document.getElementById(id);
    if (sel.value === '__add_new__') {
      var input = document.getElementById(id + '_input');
      var customVal = input ? input.value.trim() : '';
      if (customVal && configKey) {
        // Save to _Config in background (fire and forget)
        google.script.run.addConfigValue(configKey, customVal);
      }
      return customVal;
    }
    return sel.value;
  }
</script>
