<!-- JobDash — Kanban board background (SVG arcs version)
     Crisper anti-aliased arcs. Use when CSS arcs look stepped. -->

<div class="kanban-board">
  <svg class="kanban-arcs" viewBox="0 0 1600 900" preserveAspectRatio="none" aria-hidden="true">
    <defs>
      <radialGradient id="arcFade" cx="100%" cy="100%" r="120%">
        <stop offset="0%"   stop-color="#f59e0b" stop-opacity="0.22"/>
        <stop offset="60%"  stop-color="#f59e0b" stop-opacity="0.10"/>
        <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <g fill="none" stroke="url(#arcFade)" stroke-width="1.5">
      <circle cx="1600" cy="900" r="260"/>
      <circle cx="1600" cy="900" r="420"/>
      <circle cx="1600" cy="900" r="600"/>
      <circle cx="1600" cy="900" r="800"/>
      <circle cx="1600" cy="900" r="1020"/>
      <circle cx="1600" cy="900" r="1260"/>
    </g>
  </svg>

  <div class="kanban-columns">
    <!-- your columns go here -->
  </div>
</div>

<style>
.kanban-board {
  position: relative;
  background-color: #f5f3f0;
  background-image: radial-gradient(circle, rgba(41,37,36,0.13) 1px, transparent 1.2px);
  background-size: 16px 16px;
  overflow: hidden;
}
.kanban-arcs {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
}
.kanban-columns {
  position: relative;
  z-index: 1;
}
</style>
